<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media | Biosphere 2</title>
  <meta name="description" content="Stay up to date on all things Biosphere 2 by following our social media pages.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../media.css">
</head>
<body class="internal-page media-page">
  <div id="global-header"></div>
  <main>
    <header class="internal-hero">
      <div class="internal-hero-media"><img src="../../research/images/oracle_biosphere2_1.jpg" alt="Social Media" loading="eager"></div>
      <div class="internal-hero-content">
        <div class="internal-kicker">Media</div>
        <h1 class="internal-title">Social Media</h1>
        <p class="internal-summary">Stay up to date on all things Biosphere 2 by following our social media pages.</p>
      </div>
    </header>
    
    <section class="internal-section tight">
      <div class="internal-shell">
        <div class="social-intro">
          <div>
            <span class="section-label">Social Channels</span>
            <h2 class="section-heading">Follow Biosphere 2</h2>
            <p>Stay up to date on all things Biosphere 2 by following our official social media pages.</p>
          </div>
        </div>
        <div class="social-grid">
          
            <a class="social-card"  href="https://www.facebook.com/Biosphere2" target="_blank" rel="noopener">
              <i class="social-logo fa-brands fa-facebook-f" aria-hidden="true"></i>
              <span>Facebook</span>
            </a>
          
            <a class="social-card"  href="https://www.instagram.com/biosphere2/" target="_blank" rel="noopener">
              <i class="social-logo fa-brands fa-instagram" aria-hidden="true"></i>
              <span>Instagram</span>
            </a>
          
            <a class="social-card"  href="https://twitter.com/B2science" target="_blank" rel="noopener">
              <i class="social-logo fa-brands fa-x-twitter" aria-hidden="true"></i>
              <span>Twitter</span>
            </a>
          
            <a class="social-card"  href="https://www.tiktok.com/@biosphere2?lang=en" target="_blank" rel="noopener">
              <i class="social-logo fa-brands fa-tiktok" aria-hidden="true"></i>
              <span>TikTok</span>
            </a>
          
            <a class="social-card"  href="https://www.youtube.com/@Biosphere2" target="_blank" rel="noopener">
              <i class="social-logo fa-brands fa-youtube" aria-hidden="true"></i>
              <span>YouTube</span>
            </a>
          
        </div>
      </div>
    </section>
    
  </main>
  <div id="global-footer"></div>
  <script src="../../header.js"></script>
  <script>new B2Interface(2);</script>
  
</body>
</html>
